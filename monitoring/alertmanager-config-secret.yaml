# =============================================================================
# alertmanager-config-secret.yaml
# Alertmanager routing configuration with internal SMTP relay.
#
# Configuration:
#   - SMTP relay: internal host, port 25, no TLS, no auth
#   - Default receiver: email distribution list
#   - Critical alerts route to dedicated critical DL
#   - Watchdog / Deadman alert silenced (goes to null receiver)
#
# To update: edit the alertmanager.yaml value below (plain text),
# then base64-encode it:
#   cat alertmanager.yaml | base64 -w 0
#
# To apply:
#   oc apply -f alertmanager-config-secret.yaml
#   # OR update existing secret directly:
#   oc set data secret/alertmanager-main -n openshift-monitoring \
#     --from-file=alertmanager.yaml=./alertmanager-raw.yaml
# =============================================================================
#
# ---- Plain-text reference (DO NOT apply this block directly) ----------------
#
# global:
#   resolve_timeout: 5m
#   smtp_smarthost: 'YOUR-INTERNAL-SMTP-HOST:25'
#   smtp_from: 'alertmanager@your-domain.com'
#   smtp_require_tls: false
#
# inhibit_rules:
#   - source_matchers:
#       - severity="critical"
#     target_matchers:
#       - severity=~"warning|info"
#     equal:
#       - namespace
#       - alertname
#   - source_matchers:
#       - severity="warning"
#     target_matchers:
#       - severity="info"
#     equal:
#       - namespace
#       - alertname
#
# route:
#   group_by: ['namespace', 'alertname', 'severity']
#   group_wait: 30s
#   group_interval: 5m
#   repeat_interval: 12h
#   receiver: default-email
#   routes:
#     - matchers:
#         - alertname="Watchdog"
#       receiver: null-receiver
#     - matchers:
#         - severity="critical"
#       receiver: critical-email
#       continue: false
#
# receivers:
#   - name: null-receiver
#   - name: default-email
#     email_configs:
#       - to: 'ocp-alerts@your-domain.com'
#         send_resolved: true
#   - name: critical-email
#     email_configs:
#       - to: 'ocp-critical@your-domain.com'
#         send_resolved: true
#
# ---- Base64-encoded secret --------------------------------------------------
# Replace the `alertmanager.yaml` value below with your base64-encoded config.
# Generate with: cat alertmanager-raw.yaml | base64 -w 0
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-main
  namespace: openshift-monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'REPLACE-WITH-YOUR-SMTP-HOST:25'
      smtp_from: 'alertmanager@REPLACE-WITH-YOUR-DOMAIN'
      smtp_require_tls: false

    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity=~"warning|info"
        equal:
          - namespace
          - alertname
      - source_matchers:
          - severity="warning"
        target_matchers:
          - severity="info"
        equal:
          - namespace
          - alertname

    route:
      group_by: ['namespace', 'alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: default-email
      routes:
        - matchers:
            - alertname="Watchdog"
          receiver: null-receiver
        - matchers:
            - severity="critical"
          receiver: critical-email
          continue: false

    receivers:
      - name: null-receiver
      - name: default-email
        email_configs:
          - to: 'REPLACE-WITH-YOUR-DL@your-domain.com'
            send_resolved: true
      - name: critical-email
        email_configs:
          - to: 'REPLACE-WITH-YOUR-CRITICAL-DL@your-domain.com'
            send_resolved: true
