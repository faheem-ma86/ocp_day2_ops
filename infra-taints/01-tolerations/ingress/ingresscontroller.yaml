# =============================================================================
# ingresscontroller.yaml
# Patches the default IngressController to tolerate the infra node taint
# and pin router pods to infra nodes.
#
# Adjust `replicas` to match your infra node count (default: 3).
# =============================================================================
apiVersion: operator.openshift.io/v1
kind: IngressController
metadata:
  name: default
  namespace: openshift-ingress-operator
spec:
  replicas: 3
  nodePlacement:
    nodeSelector:
      matchLabels:
        node-role.kubernetes.io/infra: ""
    tolerations:
      - key: node-role.kubernetes.io/infra
        operator: Exists
        effect: NoSchedule
